server.port=${PORT:3000}

spring.application.name=uber-clone-backend
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/uber_clone}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET:change-this-secret-before-production}
app.jwt.expiration-hours=24
app.blacklist-token-cleanup-delay-ms=${BLACKLIST_TOKEN_CLEANUP_DELAY_MS:3600000}

app.socketio.host=${SOCKET_IO_HOST:0.0.0.0}
app.socketio.port=${SOCKET_IO_PORT:3001}

app.geo.h3-resolution=${H3_RESOLUTION:9}
app.geo.h3-search-ring-size=${H3_SEARCH_RING_SIZE:2}
